steps:
  # Step 1: Build the container image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gefifi-backend:$COMMIT_SHA', '.']

  # Step 2: Push the built container image to Google's private registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gefifi-backend:$COMMIT_SHA']

  # Step 3: Deploy the new container image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gefifi-backend' # This is the name for your service on Cloud Run
      - '--image=gcr.io/$PROJECT_ID/gefifi-backend:$COMMIT_SHA'
      - '--region=asia-south1' # <-- MAKE SURE THIS MATCHES YOUR GCP REGION
      - '--allow-unauthenticated' # This makes your API public
      - '--platform=managed'
      - '--service-account=591968131600-compute@developer.gserviceaccount.com'
      - '--set-secrets=JWT_SECRET=JWT_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GCP_PROJECT_ID=GCP_PROJECT_ID:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,GCS_AUDIO_BUCKET_NAME=GCS_AUDIO_BUCKET_NAME:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_VERIFY_SERVICE_SID=TWILIO_VERIFY_SERVICE_SID:latest'
images:
  - 'gcr.io/$PROJECT_ID/gefifi-backend:$COMMIT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY
