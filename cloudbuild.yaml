steps:
  # Step 1: Build the container image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gefifi-backend:$COMMIT_SHA', '.']

  # Step 2: Push the built container image to Google's private registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gefifi-backend:$COMMIT_SHA']

  # Step 3: Deploy the new container image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gefifi-backend' # This is the name for your service on Cloud Run
      - '--image=gcr.io/$PROJECT_ID/gefifi-backend:$COMMIT_SHA'
      - '--region=asia-south1' # <-- MAKE SURE THIS MATCHES YOUR GCP REGION
      - '--allow-unauthenticated' # This makes your API public
      - '--platform=managed'
images:
  - 'gcr.io/$PROJECT_ID/gefifi-backend:$COMMIT_SHA'
  