<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- PWA Manifest -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- PWA Meta Tags -->
		<meta name="theme-color" content="#10b981" />
		<meta name="background-color" content="#0f172a" />
		<meta name="display" content="standalone" />
		<meta name="orientation" content="portrait-primary" />

		<!-- iOS PWA Support -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="GEFIFI" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192x192.png" />

		<!-- Android PWA Support -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="application-name" content="GEFIFI" />

		<!-- Windows PWA Support -->
		<meta name="msapplication-TileColor" content="#10b981" />
		<meta name="msapplication-TileImage" content="%sveltekit.assets%/icons/icon-144x144.png" />

		<!-- Google Sign-In -->
		<script src="https://accounts.google.com/gsi/client" async></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- Service Worker Registration -->
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker
						.register('/sw.js')
						.then((registration) => {
							console.log('[SW] Service Worker registered successfully:', registration.scope);

							// Check for updates
							registration.addEventListener('updatefound', () => {
								const newWorker = registration.installing;
								console.log('[SW] New service worker found, installing...');

								newWorker.addEventListener('statechange', () => {
									if (newWorker.state === 'installed') {
										if (navigator.serviceWorker.controller) {
											// At this point, the updated precached content has been fetched,
											// but the previous service worker will still serve the older
											// content until all client tabs are closed.
											console.log('[SW] New content is available; please refresh.');

											// Optional: You could trigger a custom event or UI notification here
											// For now, we'll just log it. The "Network First" strategy in sw.js
											// will ensure the refresh picks up the new version.
										} else {
											// At this point, everything has been precached.
											console.log('[SW] Content is cached for offline use.');
										}
									}
								});
							});
						})
						.catch((error) => {
							console.log('[SW] Service Worker registration failed:', error);
						});
				});

				// Handle controller change (e.g. when a new SW takes over)
				let refreshing = false;
				navigator.serviceWorker.addEventListener('controllerchange', () => {
					if (!refreshing) {
						refreshing = true;
						console.log('[SW] Controller changed, reloading...');
						window.location.reload();
					}
				});
			}
		</script>
	</body>
</html>
