<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- PWA Manifest -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- PWA Meta Tags -->
		<meta name="theme-color" content="#10b981" />
		<meta name="background-color" content="#0f172a" />
		<meta name="display" content="standalone" />
		<meta name="orientation" content="portrait-primary" />

		<!-- iOS PWA Support -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="GEFIFI" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192x192.png" />

		<!-- Android PWA Support -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="application-name" content="GEFIFI" />

		<!-- Windows PWA Support -->
		<meta name="msapplication-TileColor" content="#10b981" />
		<meta name="msapplication-TileImage" content="%sveltekit.assets%/icons/icon-144x144.png" />

		<!-- Google Sign-In -->
		<script src="https://accounts.google.com/gsi/client" async></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- Service Worker Registration -->
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker
						.register('/sw.js')
						.then((registration) => {
							console.log('[SW] Service Worker registered successfully:', registration.scope);
						})
						.catch((error) => {
							console.log('[SW] Service Worker registration failed:', error);
						});
				});
			}
		</script>
	</body>
</html>
