<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>GEFIFI - Offline</title>
		<style>
			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
				color: #e2e8f0;
				margin: 0;
				padding: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.container {
				text-align: center;
				padding: 2rem;
				max-width: 400px;
			}
			.logo {
				font-size: 2rem;
				font-weight: bold;
				color: #10b981;
				margin-bottom: 1rem;
			}
			.icon {
				width: 80px;
				height: 80px;
				margin: 0 auto 1.5rem;
				background: #374151;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 2rem;
			}
			h1 {
				margin: 0 0 1rem;
				font-size: 1.5rem;
			}
			p {
				margin: 0 0 2rem;
				color: #94a3b8;
				line-height: 1.5;
			}
			.retry-btn {
				background: #10b981;
				color: white;
				border: none;
				padding: 0.75rem 1.5rem;
				border-radius: 0.5rem;
				font-size: 1rem;
				cursor: pointer;
				transition: background-color 0.2s;
			}
			.retry-btn:hover {
				background: #059669;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="logo">GEFIFI</div>
			<div class="icon">📡</div>
			<h1>You're Offline</h1>
			<p>
				It looks like you've lost your internet connection. Check your connection and try again.
			</p>
			<button class="retry-btn" onclick="window.location.reload()">Try Again</button>
		</div>
	</body>
</html>
